<!-- Basix structure of HTML Page -->
<!-- <!DOCTYPE>, <html>, <head>, <body> -->

<!--<!DOCTYPE> All HTML docs must start with a document type declaration: -->    
<!DOCTYPE html>

<!--<html> the root element of an HTML document, essential for defining the beginning and end of any web page -->
<html>

<!--<head>,  a container for metadata (data about the document) that is not displayed on the actual webpage -->
    <head>

        <!--<title>, displayed in the browser's title bar or tab and is important for SEO and bookmarks -->
        <title>Basics</title>

        <!--<meta>, used to define metadata (data about data) about an HTML document-->
        <!--not displayed on the actual web page itself.-->
        <!-- provide information to web browsers, search engines, and other web services on how to process the page-->
        
        <meta charset="UTF-8">
        <!--Specifies the character set used in the document, ensuring that text and symbols are displayed correctly.-->

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--crucial for responsive design(dimensions and scaling) on different devices, especially mobile phones. -->

        <!--<link>,  Links external resources to the document, most commonly used to link external stylesheets (.css files) and favicons.-->
        <link rel="icon" href="/images/favicon-32x32.png" type="image/png">
        
        <!--<style>, to embed CSS styles directly whitin the HTML doc-->
         
        <!--<script>, embed or link external JavaScript files for interactivity-->    

    </head>

    <!--<body>,  tag defines the main, visible content of an HTML document. Everything that a user sees in their web browser, such as headings, paragraphs, images, hyperlinks, and tables, is contained within the <body> element.-->
    <body>

      <h1>Heading 1</h1>
      <h2>Heading 2</h2>
      <h3>Heading 3</h3>
      <h4>heading 4</h4>
      <h5>heading 5</h5>
      <h6>heading 6</h6>  

      <p>Paragraph of this first html page</p>
      <p>2nd line of para</p>

      <p>Links:</p>
      <a href="https://youtube.com">YouTube</a>

      <p>Images:</p>
      <img src="/images/murmura.jpg" alt="Murmura Pic" width="200" height="100">


    </body>






</html>
